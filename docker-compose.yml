services:
  db:
    image: postgres:16-alpine
    container_name: larmig_db
    environment:
      POSTGRES_DB: larmig
      POSTGRES_USER: larmig
      POSTGRES_PASSWORD: larmig_dev
    ports:
      - "5433:5432"
    volumes:
      - larmig_pgdata:/var/lib/postgresql/data

volumes:
  larmig_pgdata:
